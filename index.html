<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> My Weather App</title>
    <link rel="stylesheet" href="style.css"> </head>

<body>
    <div class="card">
        <div class="search ">
            <input type="text" placeholder="Enter Your City">
            <button type="button" class="btn"> <img src=" download.png "></button>
        </div>
        <div class="weather ">
            <img src="weather.png" class="weather-icon ">
            <h1 class="temp ">25°C</h1>
            <h2 class="city ">New York</h2>
            <div class="details ">
                <div class="col ">
                    <img src="humidity.png">
                    <div class="humidity-box">
                        <p class="humidity ">50%</p>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="col ">
                    <img src="wind.png">
                    <div class="wind-box">
                        <p class="wind ">12 km/h</p>
                        <p>Wind Speed</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
